services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:4004/api/v1
      - VITE_APP_NAME=Interdiscount
      - VITE_DEFAULT_LANGUAGE=de
      - VITE_CLOUDINARY_CLOUD_NAME=dzyyygr1x
